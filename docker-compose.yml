version: '3.8'

services:
  proxmox-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxmox-mcp
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

    environment:
      - PROXMOX_HOST=${PROXMOX_HOST}
      - PROXMOX_PORT=${PROXMOX_PORT:-8006}
      - PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID}
      - PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_OPERATIONS=${ALLOWED_OPERATIONS:-vm.list,vm.status,vm.start,vm.stop,vm.shutdown,node.list,node.status,storage.list,backup.list,backup.status}

    # Network isolation - internal only
    networks:
      - mcp-network

    # Readonly filesystem
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

    # Security: no new privileges
    security_opt:
      - no-new-privileges:true

    # Drop all capabilities except needed
    cap_drop:
      - ALL

    # User (must match Dockerfile)
    user: 1000:1000

    # Health check
    healthcheck:
      test: [CMD, python, -c, import httpx; httpx.get('http://localhost:8000/health').status_code == 200]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Labels for monitoring
    labels:
      - mcp.service=proxmox
      - mcp.version=${MCP_VERSION:-1.0.0}

  # Optional: nginx reverse proxy with TLS
  # nginx-proxy:
  #   image: nginx:alpine
  #   container_name: proxmox-mcp-proxy
  #   ports:
  #     - "8443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/certs:ro
  #   depends_on:
  #     - proxmox-mcp
  #   networks:
  #     - mcp-network

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
