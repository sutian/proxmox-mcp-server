version: '3.8'

services:
  proxmox-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxmox-mcp
    restart: unless-stopped

    environment:
      - PROXMOX_HOST=${PROXMOX_HOST}
      - PROXMOX_PORT=${PROXMOX_PORT:-8006}
      - PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID}
      - PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_OPERATIONS=${ALLOWED_OPERATIONS:-vm.list,vm.status,vm.start,vm.stop,vm.shutdown,node.list,node.status,storage.list,backup.list,backup.status}

    ports:
      - "8000:8000"

    networks:
      - mcp-network

    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    user: 1000:1000

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    labels:
      - mcp.service=proxmox
      - mcp.version=${MCP_VERSION:-1.0.0}

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
